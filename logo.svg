<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="ghostBody" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#b87aed"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#c4b5fd" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Subtle glow behind the ghost -->
  <circle cx="256" cy="250" r="200" fill="url(#glow)"/>

  <!-- Ghost body — purple gradient with violet stroke -->
  <path d="
    M 256 52
    C 160 52, 100 130, 100 230
    L 100 380
    C 100 395, 112 405, 122 395
    C 135 382, 148 398, 160 405
    C 175 414, 185 395, 198 390
    C 210 386, 218 404, 232 408
    C 244 412, 250 398, 256 394
    C 262 398, 268 412, 280 408
    C 294 404, 302 386, 314 390
    C 327 395, 337 414, 352 405
    C 364 398, 377 382, 390 395
    C 400 405, 412 395, 412 380
    L 412 230
    C 412 130, 352 52, 256 52
    Z
  " fill="url(#ghostBody)" stroke="#6d28d9" stroke-width="3"/>

  <!-- Left eye -->
  <ellipse cx="210" cy="225" rx="32" ry="38" fill="#1a1a2e"/>
  <!-- Left eye highlight -->
  <circle cx="222" cy="213" r="11" fill="white" opacity="0.9"/>

  <!-- Right eye -->
  <ellipse cx="302" cy="225" rx="32" ry="38" fill="#1a1a2e"/>
  <!-- Right eye highlight -->
  <circle cx="314" cy="213" r="11" fill="white" opacity="0.9"/>

  <!-- Mouth — friendly open oval -->
  <ellipse cx="256" cy="300" rx="28" ry="22" fill="#1a1a2e"/>

  <!-- Tongue — deeper purple -->
  <ellipse cx="256" cy="312" rx="15" ry="10" fill="#6d28d9" opacity="0.7"/>

  <!-- Cheek blush — subtle violet glow -->
  <circle cx="175" cy="265" r="24" fill="#c084fc" opacity="0.3"/>
  <!-- Cheek blush — right -->
  <circle cx="337" cy="265" r="24" fill="#c084fc" opacity="0.3"/>
</svg>
